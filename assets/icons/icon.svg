<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F3B2D"/>
      <stop offset="1" stop-color="#1E5F44"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#E5FBC8"/>
      <stop offset="1" stop-color="#7FD06A"/>
    </linearGradient>
  </defs>

  <rect width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- Tea leaf, tilted -->
  <g transform="translate(64 64) rotate(-22)">
    <path d="M 0 -48
             C 22 -44 28 -18 24 10
             C 20 36 10 46 0 48
             C -10 46 -20 36 -24 10
             C -28 -18 -22 -44 0 -48 Z"
          fill="url(#leaf)"/>

    <!-- Center vein: subtle curve -->
    <path d="M 0 -42 Q 3 0 0 42"
          stroke="#FFFFFF" stroke-width="2.2"
          fill="none" stroke-linecap="round" opacity="0.7"/>

    <!-- Quarter note (chord marker) on the vein -->
    <ellipse cx="-4" cy="6" rx="5.5" ry="4.2" fill="#1E5F44"
             transform="rotate(-22 -4 6)"/>
    <path d="M 1.3 5 L 1.3 -16" stroke="#1E5F44" stroke-width="2.6"
          stroke-linecap="round"/>
  </g>
</svg>
